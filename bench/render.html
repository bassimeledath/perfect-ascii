<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Diagram Render</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.4;
      color: #1a1a1a;
      background: #ffffff;
      padding: 32px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      white-space: pre;
      tab-size: 4;
      /* Ensure exact monospace rendering */
      font-variant-ligatures: none;
      font-feature-settings: "liga" 0, "clig" 0;
      -webkit-font-smoothing: none;
      text-rendering: optimizeLegibility;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <pre id="diagram">PASTE_ASCII_HERE</pre>
</body>
</html>
